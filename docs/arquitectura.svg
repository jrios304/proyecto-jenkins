<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ROW 1: Jenkins pipeline -->
  <rect x="20" y="16" width="640" height="108" rx="10" fill="#FFF8F0" stroke="#854F0B" stroke-width="1"/>
  <text x="340" y="35" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">Jenkins Pipeline (CI/CD)</text>
  <rect x="28"  y="44" width="97" height="40" rx="5" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="76"  y="60" text-anchor="middle" font-size="10" font-weight="bold" fill="#633806">Checkout</text>
  <text x="76"  y="75" text-anchor="middle" font-size="9"  fill="#854F0B">git clone</text>
  <line x1="125" y1="64" x2="133" y2="64" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <rect x="133" y="44" width="97" height="40" rx="5" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="181" y="60" text-anchor="middle" font-size="10" font-weight="bold" fill="#633806">Build</text>
  <text x="181" y="75" text-anchor="middle" font-size="9"  fill="#854F0B">pip install</text>
  <line x1="230" y1="64" x2="238" y2="64" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <rect x="238" y="44" width="97" height="40" rx="5" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="286" y="60" text-anchor="middle" font-size="10" font-weight="bold" fill="#633806">Test</text>
  <text x="286" y="75" text-anchor="middle" font-size="9"  fill="#854F0B">pytest 14/14</text>
  <line x1="335" y1="64" x2="343" y2="64" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <rect x="343" y="44" width="97" height="40" rx="5" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="391" y="57" text-anchor="middle" font-size="10" font-weight="bold" fill="#633806">Terraform</text>
  <text x="391" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#633806">Validate</text>
  <text x="391" y="81" text-anchor="middle" font-size="9"  fill="#854F0B">init + validate</text>
  <line x1="440" y1="64" x2="448" y2="64" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <rect x="448" y="44" width="97" height="40" rx="5" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="496" y="57" text-anchor="middle" font-size="10" font-weight="bold" fill="#633806">K8s</text>
  <text x="496" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#633806">Validation</text>
  <text x="496" y="81" text-anchor="middle" font-size="9"  fill="#854F0B">YAML check</text>
  <line x1="545" y1="64" x2="553" y2="64" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <rect x="553" y="44" width="97" height="40" rx="5" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="601" y="57" text-anchor="middle" font-size="10" font-weight="bold" fill="#633806">Deploy</text>
  <text x="601" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#633806">Simulation</text>
  <text x="601" y="81" text-anchor="middle" font-size="9"  fill="#854F0B">echo consola</text>
  <text x="340" y="112" text-anchor="middle" font-size="9" fill="#9A6820">post: success → completado   |   failure → revisa los logs</text>

  <!-- ROW 2: GitHub | Docker Hub | Terraform -->
  <rect x="20" y="148" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="80" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">GitHub</text>
  <text x="80" y="182" text-anchor="middle" font-size="10" fill="#5F5E5A">webhook push</text>
  <path d="M80 148 L80 124" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-amber)"/>

  <rect x="160" y="148" width="130" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="225" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C447C">Docker Hub</text>
  <text x="225" y="182" text-anchor="middle" font-size="10" fill="#185FA5">tu-usuario/test-api</text>

  <rect x="310" y="140" width="350" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="485" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Terraform (IaC)</text>
  <rect x="320" y="166" width="100" height="26" rx="5" fill="#CEC8F6" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="370" y="183" text-anchor="middle" font-size="10" fill="#26215C">variables.tf</text>
  <rect x="430" y="166" width="100" height="26" rx="5" fill="#CEC8F6" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="480" y="183" text-anchor="middle" font-size="10" fill="#26215C">main.tf</text>
  <rect x="540" y="166" width="110" height="26" rx="5" fill="#CEC8F6" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="595" y="183" text-anchor="middle" font-size="10" fill="#26215C">outputs.tf</text>

  <!-- ROW 3: Usuario | Kubernetes cluster -->
  <rect x="20" y="230" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="80" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">Usuario</text>
  <text x="80" y="264" text-anchor="middle" font-size="10" fill="#5F5E5A">HTTP :80</text>

  <!-- Kubernetes cluster -->
  <rect x="160" y="220" width="500" height="340" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="410" y="242" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Kubernetes  (Minikube / GKE)</text>

  <rect x="250" y="254" width="180" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="340" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#712B13">Service</text>
  <text x="340" y="288" text-anchor="middle" font-size="10" fill="#993C1D">LoadBalancer  puerto 80</text>

  <rect x="480" y="254" width="90" height="44" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="525" y="272" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C2C2A">Metrics</text>
  <text x="525" y="287" text-anchor="middle" font-size="10" fill="#5F5E5A">server</text>

  <rect x="480" y="318" width="170" height="40" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="565" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#633806">HPA</text>
  <text x="565" y="348" text-anchor="middle" font-size="10" fill="#854F0B">Escala 2 a 10 pods</text>

  <rect x="480" y="378" width="170" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="565" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Deployment</text>
  <text x="565" y="408" text-anchor="middle" font-size="10" fill="#0F6E56">Gestiona replicas</text>

  <rect x="175" y="378" width="130" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="240" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Pod 1</text>
  <text x="240" y="408" text-anchor="middle" font-size="10" fill="#534AB7">test-api</text>

  <rect x="320" y="378" width="130" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="385" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Pod 2..N</text>
  <text x="385" y="408" text-anchor="middle" font-size="10" fill="#534AB7">test-api</text>

  <rect x="175" y="438" width="460" height="36" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="405" y="461" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C2C2A">Auto-recuperacion de pods ante fallos</text>

  <!-- Flechas internas K8s -->
  <line x1="295" y1="298" x2="250" y2="376" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="370" y1="298" x2="370" y2="376" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="525" y1="298" x2="525" y2="316" stroke="#B4B2A9" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arr-dash)"/>
  <line x1="565" y1="358" x2="565" y2="376" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <path d="M480 398 L452 398" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="405" y1="418" x2="405" y2="436" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <path d="M240 378 L240 330 L478 290" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-dash)"/>

  <!-- Flechas externas -->
  <line x1="140" y1="252" x2="248" y2="272" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M225 192 L225 376" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-blue)"/>
  <path d="M420 200 L420 218" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-purple)"/>

  <!-- Leyenda -->
  <line x1="20" y1="582" x2="640" y2="582" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="20"  y1="600" x2="46"  y2="600" stroke="#888780" stroke-width="1.5"/>
  <text x="52"  y="604" font-size="10" fill="#5F5E5A">Trafico</text>
  <line x1="110" y1="600" x2="136" y2="600" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="142" y="604" font-size="10" fill="#5F5E5A">Metricas</text>
  <line x1="210" y1="600" x2="236" y2="600" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="242" y="604" font-size="10" fill="#185FA5">Pull imagen</text>
  <line x1="330" y1="600" x2="356" y2="600" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="362" y="604" font-size="10" fill="#534AB7">IaC config</text>
  <line x1="450" y1="600" x2="476" y2="600" stroke="#854F0B" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="482" y="604" font-size="10" fill="#854F0B">CI/CD trigger</text>
</svg>
