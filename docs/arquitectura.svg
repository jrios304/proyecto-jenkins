<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Cluster container ── -->
  <rect x="175" y="35" width="470" height="490" rx="18" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="410" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Cluster Kubernetes (Minikube / GKE)</text>

  <!-- ── Usuario ── -->
  <rect x="35" y="100" width="100" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="85" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">Usuario</text>
  <text x="85" y="136" text-anchor="middle" font-size="11" fill="#5F5E5A">HTTP :80</text>

  <!-- ── Docker Hub ── -->
  <rect x="35" y="390" width="100" height="48" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="85" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Docker Hub</text>
  <text x="85" y="426" text-anchor="middle" font-size="11" fill="#185FA5">tu-usuario/test-api</text>

  <!-- ── Service ── -->
  <rect x="270" y="100" width="160" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="350" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">Service</text>
  <text x="350" y="138" text-anchor="middle" font-size="11" fill="#993C1D">LoadBalancer  puerto 80</text>

  <!-- ── Metrics Server ── -->
  <rect x="195" y="100" width="60" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="225" y="121" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">Metrics</text>
  <text x="225" y="137" text-anchor="middle" font-size="11" fill="#5F5E5A">server</text>

  <!-- ── HPA ── -->
  <rect x="470" y="100" width="150" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="545" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">HPA</text>
  <text x="545" y="138" text-anchor="middle" font-size="11" fill="#854F0B">Escala 2 a 10 pods</text>

  <!-- ── Deployment ── -->
  <rect x="470" y="210" width="150" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="545" y="231" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Deployment</text>
  <text x="545" y="248" text-anchor="middle" font-size="11" fill="#0F6E56">Gestiona replicas</text>

  <!-- ── Pod 1 ── -->
  <rect x="195" y="300" width="110" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="250" y="321" text-anchor="middle" font-size="12" font-weight="bold" fill="#3C3489">Pod 1</text>
  <text x="250" y="338" text-anchor="middle" font-size="11" fill="#534AB7">test-api</text>

  <!-- ── Pod 2 ── -->
  <rect x="320" y="300" width="110" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="375" y="321" text-anchor="middle" font-size="12" font-weight="bold" fill="#3C3489">Pod 2</text>
  <text x="375" y="338" text-anchor="middle" font-size="11" fill="#534AB7">test-api</text>

  <!-- ── Pod N ── -->
  <rect x="455" y="300" width="110" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="510" y="321" text-anchor="middle" font-size="12" font-weight="bold" fill="#3C3489">Pod N</text>
  <text x="510" y="338" text-anchor="middle" font-size="11" fill="#534AB7">test-api</text>

  <!-- dots -->
  <text x="443" y="328" text-anchor="middle" font-size="14" fill="#888780">···</text>

  <!-- ── Auto-recuperacion ── -->
  <rect x="195" y="420" width="370" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="380" y="447" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">Auto-recuperacion de pods ante fallos</text>

  <!-- ══ FLECHAS ══ -->

  <!-- Usuario → Service -->
  <line x1="135" y1="124" x2="268" y2="124" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Service → Pod 1 -->
  <line x1="310" y1="152" x2="258" y2="298" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Service → Pod 2 -->
  <line x1="350" y1="152" x2="375" y2="298" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Service → Pod N -->
  <line x1="390" y1="152" x2="500" y2="298" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HPA → Deployment -->
  <line x1="545" y1="152" x2="545" y2="208" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Deployment → Pods -->
  <path d="M545 262 L545 280 L375 280 L375 298" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Metrics server → HPA (dashed) -->
  <line x1="255" y1="126" x2="468" y2="126" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>

  <!-- Pods → Metrics (dashed) -->
  <path d="M250 300 L225 154" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>

  <!-- Pods → Auto-recuperacion -->
  <line x1="375" y1="352" x2="375" y2="418" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Docker Hub → Pods (dashed azul) -->
  <path d="M135 414 L183 414 L183 328 L193 328" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-blue)"/>

  <!-- ── Leyenda ── -->
  <line x1="200" y1="502" x2="228" y2="502" stroke="#888780" stroke-width="1.5"/>
  <text x="234" y="506" font-size="11" fill="#5F5E5A">Flujo de trafico</text>

  <line x1="310" y1="502" x2="338" y2="502" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="344" y="506" font-size="11" fill="#5F5E5A">Flujo de metricas</text>

  <line x1="430" y1="502" x2="458" y2="502" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="464" y="506" font-size="11" fill="#185FA5">Pull de imagen</text>
</svg>
